<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda de Celulares | WhatsApp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="brand">📱 Tienda de Celulares</div>
    <div class="top-categories" id="chipsMarcas"></div>
    <div class="controls">
      <input id="buscar" type="text" placeholder="Buscar celular..." />
      <select id="marca">
        <option value="">Todas las marcas</option>
      </select>
      <select id="orden">
        <option value="destacados">Destacados</option>
        <option value="menor">Menor precio</option>
        <option value="mayor">Mayor precio</option>
        <option value="az">A-Z</option>
      </select>
      <button class="cart-btn" onclick="abrirCarrito()">🛒 Carrito <span id="cartCount">0</span></button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <h1></h1>
      </div>
      <div class="hero-badge"></div>
    </section>

    <div class="meta">
      <span id="estado">Cargando productos...</span>
      <span id="ultimaActualizacion">Actualización en vivo</span>
      <span id="fuenteBadge" class="source-badge live">Catálogo en vivo</span>
    </div>

    <section id="productos" class="grid"></section>
  </main>

  <aside id="carritoPanel" class="drawer">
    <div class="drawer-head">
      <h2>Tu carrito</h2>
      <button class="ghost" onclick="cerrarCarrito()">✕</button>
    </div>
    <div id="listaCarrito" class="drawer-body"></div>
    <div class="drawer-foot">
      <p>Total: <strong id="cartTotal">$0</strong></p>
      <button class="primary full" onclick="comprarWhatsApp()">Finalizar por WhatsApp</button>
      <button class="ghost full" onclick="vaciarCarrito()">Vaciar carrito</button>
    </div>
  </aside>

  <section id="detalle" class="detalle" onclick="cerrarDetalle(event)">
    <div class="panel" id="panelDetalle"></div>
  </section>

  <div id="overlay" class="overlay" onclick="cerrarCarrito()"></div>

  <script src="app.js"></script>
</body>
</html>
