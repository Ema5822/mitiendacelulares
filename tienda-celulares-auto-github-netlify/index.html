<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda de Celulares</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">📱 Tienda de Celulares</div>
    <input id="buscar" type="text" placeholder="Buscar celular o marca..." />
  </header>

  <main class="container">
    <div class="meta">
      <span id="estado">Cargando celulares...</span>
      <span class="ayuda">Se actualiza desde celulares.json</span>
    </div>
    <div id="productos" class="grid"></div>
  </main>

  <script>
    let celulares = [];

    async function cargar() {
      const estado = document.getElementById("estado");
      try {
        const res = await fetch("./celulares.json?_=" + Date.now());
        const data = await res.json();
        celulares = Array.isArray(data) ? data : [];
        estado.textContent = `Se cargaron ${celulares.length} celulares`;
        mostrar(celulares);
      } catch (e) {
        estado.textContent = "No se pudieron cargar los celulares";
      }
    }

    function mostrar(lista) {
      const cont = document.getElementById("productos");
      cont.innerHTML = "";

      if (!lista.length) {
        cont.innerHTML = '<p class="vacio">No hay resultados para esa búsqueda.</p>';
        return;
      }

      lista.forEach((p) => {
        const nombreCodificado = encodeURIComponent(p.nombre);
        const precio = Number(p.precio || 0).toLocaleString("es-AR");
        const marca = p.marca || "";
        const imagen = p.imagen || "https://placehold.co/320x320/png?text=Celular";

        cont.innerHTML += `
          <article class="card">
            <img src="${imagen}" alt="${p.nombre}" />
            <h3>${p.nombre}</h3>
            <p class="marca">${marca}</p>
            <p class="precio">$${precio}</p>
            <a class="btn" target="_blank" href="https://wa.me/549XXXXXXXXXX?text=Hola%20quiero%20comprar%20${nombreCodificado}">
              Comprar por WhatsApp
            </a>
          </article>
        `;
      });
    }

    document.getElementById("buscar").addEventListener("input", (e) => {
      const texto = e.target.value.toLowerCase().trim();
      const filtrados = celulares.filter((p) =>
        (p.nombre || "").toLowerCase().includes(texto) ||
        (p.marca || "").toLowerCase().includes(texto)
      );
      mostrar(filtrados);
    });

    cargar();
  </script>
</body>
</html>
