<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda de Celulares</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="brand">📱 Tienda de Celulares</div>
    <div class="controls">
      <input id="buscar" type="text" placeholder="Buscar celular..." />
      <select id="marca">
        <option value="">Todas las marcas</option>
      </select>
      <select id="orden">
        <option value="destacados">Destacados</option>
        <option value="menor">Menor precio</option>
        <option value="mayor">Mayor precio</option>
        <option value="az">A-Z</option>
      </select>
      <button class="cart-btn" onclick="abrirCarrito()">🛒 Carrito <span id="cartCount">0</span></button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <h1>Celulares con atención por WhatsApp</h1>
        <p>Fotos tomadas desde la misma página de origen, catálogo amplio y ficha con detalles.</p>
      </div>
      <div class="hero-badge">Atención: 5493405504914</div>
    </section>

    <div class="meta">
      <span id="estado">Cargando catálogo...</span>
      <span id="origen">Origen: Evophone</span>
    </div>

    <section id="productos" class="grid"></section>
  </main>

  <aside id="carritoPanel" class="drawer">
    <div class="drawer-head">
      <h2>Tu carrito</h2>
      <button class="ghost" onclick="cerrarCarrito()">✕</button>
    </div>
    <div id="listaCarrito" class="drawer-body"></div>
    <div class="drawer-foot">
      <p>Total: <strong id="cartTotal">$0</strong></p>
      <button class="primary full" onclick="comprarWhatsApp()">Finalizar por WhatsApp</button>
      <button class="ghost full" onclick="vaciarCarrito()">Vaciar carrito</button>
    </div>
  </aside>

  <div id="detalle" class="detalle" onclick="cerrarDetalle(event)">
    <div class="panel-wrap">
      <div id="detalleContenido" class="panel"></div>
    </div>
  </div>

  <div id="overlay" class="overlay" onclick="cerrarCarrito()"></div>

  <script>
    let productos = [];
    let carrito = JSON.parse(localStorage.getItem("carritoCelulares") || "[]");

    function normalizarTexto(valor = "") {
      return valor
        .toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function slugify(valor = "") {
      return normalizarTexto(valor).replace(/\s+/g, "-");
    }

    function inferirMarca(nombre = "") {
      const base = nombre.toLowerCase();
      if (base.includes("samsung")) return "Samsung";
      if (base.includes("moto") || base.includes("motorola")) return "Motorola";
      if (base.includes("xiaomi") || base.includes("redmi") || base.includes("poco")) return "Xiaomi";
      if (base.includes("realme")) return "Realme";
      return "Otros";
    }

    function formatoPrecio(valor) {
      return "$" + Number(valor || 0).toLocaleString("es-AR");
    }

    function textoStock(producto) {
      if (typeof producto.stock === "number" && producto.stock >= 0) {
        return producto.stock > 0 ? `En stock: ${producto.stock} disponibles` : "Sin stock";
      }
      return producto.stockTexto || (producto.agotado ? "Sin stock" : "Disponible");
    }

    function disponible(producto) {
      if (typeof producto.stock === "number") return producto.stock > 0;
      return !producto.agotado;
    }

    async function cargar() {
      try {
        const [resLocal, resLive] = await Promise.all([
          fetch("./celulares.json"),
          fetch("/.netlify/functions/celulares")
        ]);

        const baseLocal = await resLocal.json();
        const vivo = await resLive.json();

        const mapaLocal = new Map();
        baseLocal.forEach((item, index) => {
          const keyNombre = slugify(item.nombre || "");
          const keySimple = slugify(`${item.marca || inferirMarca(item.nombre)} ${item.nombre || ""}`);
          const enriched = { ...item, id: item.id ?? index + 1 };
          mapaLocal.set(keyNombre, enriched);
          mapaLocal.set(keySimple, enriched);
        });

        productos = (vivo.productos || []).map((item, index) => {
          const keyNombre = slugify(item.nombre || "");
          const keySimple = slugify(`${item.marca || inferirMarca(item.nombre)} ${item.nombre || ""}`);
          const extra = mapaLocal.get(keyNombre) || mapaLocal.get(keySimple) || {};
          return {
            id: item.id ?? extra.id ?? index + 1,
            nombre: item.nombre,
            marca: item.marca || extra.marca || inferirMarca(item.nombre),
            precio: item.precio ?? extra.precio ?? 0,
            imagen: item.imagen || extra.imagen,
            productoUrl: item.productoUrl || extra.productoUrl || "",
            ram: item.ram || extra.ram || "No informado",
            almacenamiento: item.almacenamiento || extra.almacenamiento || "No informado",
            pantalla: item.pantalla || extra.pantalla || "No informado",
            bateria: item.bateria || extra.bateria || "No informado",
            camara: item.camara || extra.camara || "No informado",
            stock: typeof item.stock === "number" ? item.stock : (typeof extra.stock === "number" ? extra.stock : null),
            stockTexto: item.stockTexto || extra.stockTexto || "Disponible",
            agotado: Boolean(item.agotado),
            origen: item.origen || "Evophone"
          };
        });

        cargarMarcas();
        document.getElementById("estado").textContent = `Se cargaron ${productos.length} productos`;
        document.getElementById("origen").textContent = `Última actualización: ${vivo.actualizado || "recién"}`;
        render();
        actualizarCarrito();
      } catch (error) {
        console.error(error);
        document.getElementById("estado").textContent = "Error cargando celulares. Revisá la función de Netlify.";
        document.getElementById("productos").innerHTML = '<div class="empty">No se pudo cargar el catálogo en vivo.</div>';
      }
    }

    function cargarMarcas() {
      const select = document.getElementById("marca");
      const marcas = [...new Set(productos.map(p => p.marca).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      select.innerHTML = '<option value="">Todas las marcas</option>' + marcas.map(m => `<option value="${m}">${m}</option>`).join("");
    }

    function obtenerListaFiltrada() {
      let lista = [...productos];
      const texto = document.getElementById("buscar").value.toLowerCase().trim();
      const marca = document.getElementById("marca").value;
      const orden = document.getElementById("orden").value;

      lista = lista.filter(p => {
        const base = `${p.nombre || ""} ${p.marca || ""} ${p.ram || ""} ${p.almacenamiento || ""}`.toLowerCase();
        const matchTexto = base.includes(texto);
        const matchMarca = !marca || p.marca === marca;
        return matchTexto && matchMarca;
      });

      if (orden === "menor") lista.sort((a, b) => a.precio - b.precio);
      if (orden === "mayor") lista.sort((a, b) => b.precio - a.precio);
      if (orden === "az") lista.sort((a, b) => (a.nombre || "").localeCompare(b.nombre || ""));

      return lista;
    }

    function render() {
      const lista = obtenerListaFiltrada();
      const cont = document.getElementById("productos");
      cont.innerHTML = "";

      if (!lista.length) {
        cont.innerHTML = '<div class="empty">No se encontraron celulares con ese filtro.</div>';
        return;
      }

      lista.forEach(p => {
        cont.innerHTML += `
          <article class="card">
            <img src="${p.imagen}" alt="${p.nombre}" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x400?text=Sin+foto'">
            <div class="tag">${p.marca}</div>
            <h3>${p.nombre}</h3>
            <p class="stock ${disponible(p) ? 'ok' : 'off'}">${textoStock(p)}</p>
            <p class="precio">${formatoPrecio(p.precio)}</p>
            <div class="mini-specs">
              <span>${p.ram}</span>
              <span>${p.almacenamiento}</span>
            </div>
            <div class="actions">
              <button class="primary" onclick="agregarAlCarrito(${p.id})" ${!disponible(p) ? "disabled" : ""}>Agregar</button>
              <button class="ghost" onclick="verDetalle(${p.id})">Ver detalles</button>
              <a class="wa" target="_blank" href="https://wa.me/5493405504914?text=${encodeURIComponent('Hola, quiero consultar por ' + p.nombre + ' - Precio: ' + formatoPrecio(p.precio))}">WhatsApp</a>
            </div>
          </article>
        `;
      });
    }

    function verDetalle(id) {
      const p = productos.find(x => x.id === id);
      if (!p) return;
      document.body.classList.add("modal-open");
      document.getElementById("detalle").style.display = "flex";
      document.getElementById("detalleContenido").innerHTML = `
        <button class="close-detail" onclick="cerrarDetalle()">✕</button>
        <div class="detalle-grid">
          <div class="detalle-img-box">
            <img src="${p.imagen}" alt="${p.nombre}" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/500x500?text=Sin+foto'">
          </div>
          <div>
            <div class="tag">${p.marca}</div>
            <h2>${p.nombre}</h2>
            <p class="precio big">${formatoPrecio(p.precio)}</p>
            <p class="stock ${disponible(p) ? 'ok' : 'off'}">${textoStock(p)}</p>
            <div class="specs">
              <p><b>RAM:</b> ${p.ram}</p>
              <p><b>Almacenamiento:</b> ${p.almacenamiento}</p>
              <p><b>Pantalla:</b> ${p.pantalla}</p>
              <p><b>Batería:</b> ${p.bateria}</p>
              <p><b>Cámara:</b> ${p.camara}</p>
            </div>
            <div class="actions left">
              <button class="primary" onclick="agregarAlCarrito(${p.id})" ${!disponible(p) ? "disabled" : ""}>Agregar al carrito</button>
              <a class="wa" target="_blank" href="https://wa.me/5493405504914?text=${encodeURIComponent('Hola, quiero comprar ' + p.nombre + ' - Precio: ' + formatoPrecio(p.precio))}">Comprar por WhatsApp</a>
              ${p.productoUrl ? `<a class="ghost" target="_blank" href="${p.productoUrl}">Ver publicación original</a>` : ""}
            </div>
          </div>
        </div>
      `;
    }

    function cerrarDetalle(event) {
      if (event && event.target && event.target.id !== "detalle") return;
      document.body.classList.remove("modal-open");
      document.getElementById("detalle").style.display = "none";
    }

    function agregarAlCarrito(id) {
      const producto = productos.find(p => p.id === id);
      if (!producto || !disponible(producto)) return;

      const item = carrito.find(p => p.id === id);
      const cantidadActual = item ? item.cantidad : 0;
      if (typeof producto.stock === "number" && cantidadActual >= producto.stock) {
        alert("No hay más unidades disponibles para agregar.");
        return;
      }

      if (item) {
        item.cantidad += 1;
      } else {
        carrito.push({ ...producto, cantidad: 1 });
      }
      guardarCarrito();
      actualizarCarrito();
    }

    function cambiarCantidad(id, delta) {
      const item = carrito.find(p => p.id === id);
      const producto = productos.find(p => p.id === id);
      if (!item || !producto) return;

      const nuevaCantidad = item.cantidad + delta;
      if (typeof producto.stock === "number" && nuevaCantidad > producto.stock) {
        alert("No hay más unidades disponibles.");
        return;
      }

      item.cantidad = nuevaCantidad;
      if (item.cantidad <= 0) {
        carrito = carrito.filter(p => p.id !== id);
      }
      guardarCarrito();
      actualizarCarrito();
    }

    function quitarItem(id) {
      carrito = carrito.filter(p => p.id !== id);
      guardarCarrito();
      actualizarCarrito();
    }

    function guardarCarrito() {
      localStorage.setItem("carritoCelulares", JSON.stringify(carrito));
    }

    function actualizarCarrito() {
      const count = carrito.reduce((acc, item) => acc + item.cantidad, 0);
      const total = carrito.reduce((acc, item) => acc + item.precio * item.cantidad, 0);

      document.getElementById("cartCount").textContent = count;
      document.getElementById("cartTotal").textContent = formatoPrecio(total);

      const lista = document.getElementById("listaCarrito");
      if (!carrito.length) {
        lista.innerHTML = '<p class="empty-cart">Tu carrito está vacío.</p>';
        return;
      }

      lista.innerHTML = carrito.map(item => {
        const limite = typeof item.stock === "number" ? ` · Máx: ${item.stock}` : "";
        return `
          <div class="cart-item">
            <div>
              <strong>${item.nombre}</strong>
              <p>${item.marca} · ${formatoPrecio(item.precio)}${limite}</p>
            </div>
            <div class="qty">
              <button onclick="cambiarCantidad(${item.id}, -1)">-</button>
              <span>${item.cantidad}</span>
              <button onclick="cambiarCantidad(${item.id}, 1)">+</button>
            </div>
            <button class="remove" onclick="quitarItem(${item.id})">Eliminar</button>
          </div>
        `;
      }).join("");
    }

    function abrirCarrito() {
      document.getElementById("carritoPanel").classList.add("open");
      document.getElementById("overlay").classList.add("show");
    }

    function cerrarCarrito() {
      document.getElementById("carritoPanel").classList.remove("open");
      document.getElementById("overlay").classList.remove("show");
    }

    function vaciarCarrito() {
      carrito = [];
      guardarCarrito();
      actualizarCarrito();
    }

    function comprarWhatsApp() {
      if (!carrito.length) {
        alert("Tu carrito está vacío");
        return;
      }
      const total = carrito.reduce((acc, item) => acc + item.precio * item.cantidad, 0);
      let texto = "Hola, quiero hacer este pedido:%0A%0A";
      carrito.forEach(item => {
        texto += `• ${item.nombre} x${item.cantidad} - ${formatoPrecio(item.precio * item.cantidad)}%0A`;
      });
      texto += `%0ATotal: ${formatoPrecio(total)}`;
      window.open("https://wa.me/5493405504914?text=" + texto, "_blank");
    }

    document.getElementById("buscar").addEventListener("input", render);
    document.getElementById("marca").addEventListener("change", render);
    document.getElementById("orden").addEventListener("change", render);

    cargar();
  </script>
</body>
</html>
