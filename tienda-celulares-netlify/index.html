
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tienda Celulares</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📱 Tienda de Celulares</h1>
<input id="buscar" placeholder="Buscar celular">
</header>

<div id="productos" class="grid"></div>

<script>

let celulares=[]

fetch("/.netlify/functions/celulares")
.then(r=>r.json())
.then(data=>{
celulares=data
mostrar(data)
})

function mostrar(lista){

const cont=document.getElementById("productos")
cont.innerHTML=""

lista.forEach(p=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.imagen}" onerror="this.src='https://via.placeholder.com/150'">

<h3>${p.nombre}</h3>

<p class="precio">$${p.precio}</p>

<a target="_blank" href="https://wa.me/549XXXXXXXXXX?text=Hola quiero comprar ${p.nombre}">

<button>Comprar por WhatsApp</button>

</a>

</div>

`

})

}

document.getElementById("buscar").addEventListener("input",(e)=>{

let texto=e.target.value.toLowerCase()

let filtrados=celulares.filter(p=>
p.nombre.toLowerCase().includes(texto)
)

mostrar(filtrados)

})

</script>

</body>
</html>
